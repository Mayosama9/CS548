experiment:
  name: fedleak_exp
  output_dir: outputs

dataset:
  name: cifar10
  num_classes: 10
  shape: [1, 3, 32, 32]

federated:
  num_clients: 10
  rounds: 10
  client_fraction: 0.5

training:
  batch_size: 32
  lr: 0.01
  momentum: 0.9
  local_epochs: 5

attack:
  enabled: true
  type: fedleak   # dlg / fedleak
  lr: 0.1
  iterations: 300
  iters: 300
  top_k_ratio: 0.1
  lambda: 0.5
  tv_weight: 0.0001

defense:
  enabled: true
  top_k_ratio: 0.05
  noise_scale: 0.5

data:
  alpha: 0.1

seed:
  python: 42
  numpy: 42
  torch: 42